version: 2
models:
- name: week3_automaton_auditor_verdicts
  description: dbt schema tests for week3-automaton-auditor-verdicts
  columns:
  - name: audit_id
    tests:
    - not_null
  - name: target_repo
    tests:
    - not_null
  - name: dimension_id
    tests:
    - not_null
  - name: final_score
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: '>= 1'
    - dbt_utils.expression_is_true:
        expression: <= 5
  - name: prosecutor_score
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: '>= 1'
    - dbt_utils.expression_is_true:
        expression: <= 5
  - name: defense_score
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: '>= 1'
    - dbt_utils.expression_is_true:
        expression: <= 5
  - name: tech_lead_score
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: '>= 1'
    - dbt_utils.expression_is_true:
        expression: <= 5
  - name: reasoning
    tests:
    - not_null
  - name: dissent_summary
    tests: []
  - name: evidence_confidence
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: '>= 0.0'
    - dbt_utils.expression_is_true:
        expression: <= 1.0
  - name: evidence_found
    tests:
    - not_null
  - name: audited_at
    tests:
    - not_null
