version: 2
models:
- name: week5_ledger_events
  description: dbt schema tests for week5-ledger-events
  columns:
  - name: event_id
    tests:
    - not_null
  - name: stream_id
    tests:
    - not_null
  - name: stream_position
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: '>= 1'
    - dbt_utils.expression_is_true:
        expression: <= 8.0
  - name: global_position
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: '>= 1'
    - dbt_utils.expression_is_true:
        expression: <= 12.0
  - name: event_type
    tests:
    - not_null
  - name: event_version
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: '>= 1'
    - dbt_utils.expression_is_true:
        expression: <= 3
  - name: payload_application_id
    tests:
    - not_null
  - name: payload_applicant_id
    tests:
    - not_null
  - name: payload_requested_amount_usd
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 250000.0'
    - dbt_utils.expression_is_true:
        expression: <= 250000.0
  - name: payload_loan_purpose
    tests: []
  - name: payload_submission_channel
    tests: []
  - name: metadata_correlation_id
    tests:
    - not_null
  - name: metadata_causation_id
    tests:
    - not_null
  - name: metadata_source_service
    tests:
    - not_null
  - name: schema_version
    tests:
    - not_null
  - name: occurred_at
    tests:
    - not_null
  - name: recorded_at
    tests:
    - not_null
  - name: payload_assigned_agent_id
    tests:
    - not_null
  - name: payload_priority
    tests: []
  - name: payload_agent_id
    tests:
    - not_null
  - name: payload_session_id
    tests:
    - not_null
  - name: payload_agent_type
    tests: []
  - name: payload_model_version
    tests: []
  - name: payload_context_source
    tests: []
  - name: payload_context_token_count
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 4200.0'
    - dbt_utils.expression_is_true:
        expression: <= 4200.0
  - name: payload_node_name
    tests: []
  - name: payload_node_sequence
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 1.0'
    - dbt_utils.expression_is_true:
        expression: <= 2.0
  - name: payload_llm_called
    tests:
    - accepted_values:
        values:
        - 'False'
        - 'True'
  - name: payload_duration_ms
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 320.0'
    - dbt_utils.expression_is_true:
        expression: <= 1840.0
  - name: payload_llm_tokens_input
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 3200.0'
    - dbt_utils.expression_is_true:
        expression: <= 3200.0
  - name: payload_llm_tokens_output
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 480.0'
    - dbt_utils.expression_is_true:
        expression: <= 480.0
  - name: payload_llm_cost_usd
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 0.0042'
    - dbt_utils.expression_is_true:
        expression: <= 0.0042
  - name: payload_confidence_score
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 0.0'
    - dbt_utils.expression_is_true:
        expression: <= 1.0
  - name: payload_risk_tier
    tests: []
  - name: payload_recommended_limit_usd
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 200000.0'
    - dbt_utils.expression_is_true:
        expression: <= 200000.0
  - name: payload_analysis_duration_ms
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 2160.0'
    - dbt_utils.expression_is_true:
        expression: <= 2160.0
  - name: payload_input_data_hash
    tests: []
  - name: payload_total_nodes_executed
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 2.0'
    - dbt_utils.expression_is_true:
        expression: <= 2.0
  - name: payload_total_llm_calls
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 1.0'
    - dbt_utils.expression_is_true:
        expression: <= 1.0
  - name: payload_total_tokens_used
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 3680.0'
    - dbt_utils.expression_is_true:
        expression: <= 3680.0
  - name: payload_total_cost_usd
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 0.0042'
    - dbt_utils.expression_is_true:
        expression: <= 0.0042
  - name: payload_fraud_score
    tests:
    - dbt_utils.expression_is_true:
        expression: '>= 0.12'
    - dbt_utils.expression_is_true:
        expression: <= 0.12
  - name: payload_screening_model_version
    tests: []
  - name: payload_regulation_set_version
    tests: []
  - name: payload_orchestrator_agent_id
    tests:
    - not_null
  - name: payload_recommendation
    tests: []
  - name: payload_decision_basis_summary
    tests: []
  - name: payload_reason
    tests: []
  - name: payload_assigned_to
    tests: []
